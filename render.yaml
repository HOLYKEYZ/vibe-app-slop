services:
  - type: web
    name: agent-hub-backend
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 3001
      - key: NODE_VERSION
        value: 20.18.0
      - key: CODEX_MODEL
        sync: false
      - key: OPENCODE_MODEL
        sync: false
      - key: WINDSURF_MODEL
        sync: false
      - key: KIRO_MODEL
        sync: false
      - key: KIRO_REGION
        sync: false
